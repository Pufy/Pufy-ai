<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pufy AI v9.1</title><link rel="stylesheet" href="style.css">
</head>
<body>
<section id="welcomeGate" class="gate">
  <div class="gateCard">
    <img class="animeMascot bigMascot" src="assets/pufy-cozy.svg" alt="Pufy">
    <h1>Pufy AI</h1>
    <p>Yoo 😭✨ Sana nasıl hitap edeyim?</p>
    <div class="gateRow"><input id="nicknameInput" placeholder="Lina, Moon, kanka..."><button id="saveNickname">Devam</button></div>
  </div>
</section>
<section id="modeGate" class="gate hidden">
  <div class="gateCard">
    <img class="animeMascot bigMascot" id="modeMascot" src="assets/pufy-cozy.svg" alt="Pufy">
    <h1>Mod seç 😼</h1>
    <div class="modeButtons"><button id="chooseCozy">🩷 Cozy Pufy</button><button id="chooseChaos">💛 Chaos Pufy</button></div>
  </div>
</section>

<div id="flyPufy" class="flyPufy"><img src="assets/pufy-cozy.svg" alt="Pufy"></div>

<main class="app">
<aside class="side">
  <div class="brand"><img id="brandMascot" class="brandMascot" src="assets/pufy-cozy.svg"><div><h1>Pufy AI</h1><p id="vibeLabel">Cozy Mode 🩷</p></div></div>
  <button id="newChat" class="primary">+ Yeni sohbet ✨</button>
  <div id="status" class="status">kontrol ediliyor...</div>
  <h3>💬 Sohbetler</h3><div id="chatList"></div>
  <div class="card"><b>v9.1 Anime Mascot 😼</b><p>Artık emoji değil: SVG chibi Pufy maskot.</p></div>
</aside>

<section class="chat">
<header><div><h2 id="title">Yeni sohbet</h2><p><span class="dot"></span> <span id="modeText">Pufy Chat</span></p></div><button id="theme">🌙</button></header>
<section id="messages"></section>
<div id="typing" class="typing hidden"><span>🐾</span><i></i><i></i><i></i> Pufy yazıyo...</div>
<div class="chips"><button data-mode="chat">💬 Chat</button><button data-mode="lesson">📚 Ders</button><button data-mode="essa">🧸 ESSA</button><button data-mode="minecraft">🎮 MC</button><button data-mode="art">🎨 Çizim</button><button data-mode="fun">👹 Kaos</button></div>
<div class="input"><input id="input" placeholder="Pufy’ye yaz..."><button id="send">➤</button></div>
</section>

<aside class="roomPanel">
<h3>🏠 Pufy'nin odası</h3>
<div id="roomBox" class="roomBox cozyRoom">
  <div class="window">🌙</div><div class="lights">✦ ✧ ✦ ✧</div><div class="shelf">🧸 📚 🎀</div><div class="bed">🛏️</div><div class="desk">💻</div><div class="ramen">🍜</div><div class="rug">🐾</div>
  <img id="roomMascot" class="roomMascot idle" src="assets/pufy-cozy.svg" alt="Pufy">
  <div id="bubble" class="bubble">hii 👀</div>
</div>
<div class="card"><h3>🧠 Hafıza</h3><ul id="memory"><li>Henüz bilgi yok</li></ul></div>
<button class="tool" data-prompt="Bana video fikri ver">🎬 Video fikri</button>
<button class="tool" data-prompt="Bir ESSA lore yaz">🧸 ESSA lore</button>
<button class="tool" data-prompt="Minecraft ev fikri ver">🎮 MC build</button>
</aside>
</main>
<script src="memory.js"></script><script src="room.js"></script><script src="script.js"></script>
</body></html>

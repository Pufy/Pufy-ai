<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pufy AI Fixed</title><link rel="stylesheet" href="style.css"></head><body>
<section id="welcomeGate" class="gate"><div class="gate-card"><img class="hero" src="pufy_idle.png"><h1>Pufy AI</h1><p>Yoo 😭✨ Sana nasıl hitap edeyim?</p><div class="row"><input id="nicknameInput" placeholder="Lina, Moon, kanka..."><button id="saveNickname">Devam</button></div></div></section>
<section id="modeGate" class="gate hidden"><div class="gate-card"><img id="modeMascot" class="hero" src="pufy_idle.png"><h1>Mod seç 😼</h1><div class="modes"><button id="cozyBtn">🩷 Cozy</button><button id="chaosBtn">💛 Chaos</button></div></div></section>
<div id="flyPufy" class="fly"><img src="pufy_walk.png"></div>
<main class="app"><aside class="side"><div class="brand"><img id="brandMascot" class="brand-img" src="pufy_idle.png"><div><h1>Pufy AI</h1><p id="vibeLabel">Cozy Mode 🩷</p></div></div><button id="newChat" class="primary">+ Yeni sohbet ✨</button><div id="status" class="status">AI kontrol ediliyor...</div><h3>💬 Sohbetler</h3><div id="chatList"></div><div class="card"><b>Fixed Real Build 😼</b><p>Emoji oda yok. Görseller ana dizinde.</p></div></aside>
<section class="chat"><header><div><h2 id="title">Yeni sohbet</h2><p><span class="dot"></span> <span id="modeText">Pufy Chat</span></p></div><button id="theme">🌙</button></header><section id="messages"></section><div id="typing" class="typing hidden">🐾 Pufy yazıyo...</div><div class="chips"><button data-mode="chat">💬 Chat</button><button data-mode="lesson">📚 Ders</button><button data-mode="essa">🧸 ESSA</button><button data-mode="minecraft">🎮 MC</button><button data-mode="art">🎨 Çizim</button><button data-mode="fun">👹 Kaos</button></div><div class="input"><input id="input" placeholder="Pufy’ye yaz..."><button id="send">➤</button></div></section>
<aside class="room"><h3>Pufy'nin odası</h3><div class="room-box"><img id="roomBg" class="room-bg" src="room-cozy.svg"><img id="roomMascot" class="room-mascot" src="pufy_idle.png"><div id="bubble" class="bubble">hii 👀</div></div><div class="card"><h3>🧠 Hafıza</h3><ul id="memory"><li>Henüz bilgi yok</li></ul></div><button class="tool" data-prompt="Bana video fikri ver">🎬 Video fikri</button><button class="tool" data-prompt="Bir ESSA lore yaz">🧸 ESSA lore</button></aside></main>
<script src="memory.js"></script><script src="room.js"></script><script src="script.js"></script></body></html>
